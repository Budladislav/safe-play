<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#11130f" />
    <meta name="description" content="Safe Play — спокойная пауза между импульсом и игровой сессией." />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css?v=2.3.0" />
    <title>Safe Play</title>
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div class="app-shell">
      <header class="topbar">
        <button class="brand" data-view-link="home" aria-label="На главную">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40" role="img">
              <path d="M20 3 33 8v10c0 9-5.6 15.2-13 19C12.6 33.2 7 27 7 18V8l13-5Z" />
              <path class="playstation-symbol" d="M16.2 12.2c5.8.5 8.7 2.2 8.7 5 0 2.2-1.7 3.7-4.9 4.4v-5.5c0-1.1-.7-1.8-2.1-2.1v12.1l-1.7.5V12.2Zm4.7 11.1c3-.8 5.6-.9 7-.2 1.5.7.8 1.8-1.6 2.6-2.7.9-6.3 1.4-9.1 1.1-2.1-.2-2.4-.9-.7-1.8 1.2-.6 2.7-1.1 4.4-1.5v1.2c-1 .3-1.8.6-2.3.9-.7.4-.5.7.4.8 1.6.1 3.8-.3 5.4-.8 1.2-.4 1.5-.8.7-1.1-.8-.4-2.4-.3-4.2.2v-1.4Z" />
            </svg>
          </span>
          <span>
            <strong>Safe Play</strong>
            <small>играй по своему решению</small>
          </span>
        </button>

        <div class="topbar-actions">
          <span class="connection-pill" id="connectionPill">
            <span class="status-dot"></span>
            <span id="connectionText">офлайн-режим готов</span>
          </span>
          <button class="icon-button hidden" id="installButton" title="Установить приложение" aria-label="Установить приложение">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 19h14" /></svg>
          </button>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar" aria-label="Основная навигация">
          <nav class="nav-list">
            <button class="nav-item active" data-view-link="home">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1v-9Z" /></svg>
              <span>Сегодня</span>
            </button>
            <button class="nav-item" data-view-link="library">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10l3 4v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6l3-4Zm2 5v4m-2-2h4m5-1h.1m2 2h.1M9 8V5h6v3" /></svg>
              <span>Игры</span>
            </button>
            <button class="nav-item" data-view-link="history">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v16H4V5Zm4-2v4m8-4v4M4 10h16M8 14h3m-3 3h6" /></svg>
              <span>История</span>
            </button>
            <button class="nav-item" data-view-link="stats">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" /></svg>
              <span>Статистика</span>
            </button>
            <button class="nav-item" data-view-link="settings">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M9.8 3h4.4l.6 2.4c.5.2 1 .5 1.4.8l2.3-.7 2.2 3.8-1.8 1.7a7 7 0 0 1 0 2l1.8 1.7-2.2 3.8-2.3-.7c-.4.3-.9.6-1.4.8l-.6 2.4H9.8l-.6-2.4c-.5-.2-1-.5-1.4-.8l-2.3.7-2.2-3.8L5.1 13a7 7 0 0 1 0-2L3.3 9.3l2.2-3.8 2.3.7c.4-.3.9-.6 1.4-.8L9.8 3Z" /></svg>
              <span>Настройки</span>
            </button>
          </nav>

        </aside>

        <main id="app" tabindex="-1"></main>
      </div>

      <nav class="bottom-nav" aria-label="Основная навигация">
        <button class="nav-item active" data-view-link="home">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1v-9Z" /></svg>
          <span>Сегодня</span>
        </button>
        <button class="nav-item" data-view-link="library">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10l3 4v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6l3-4Zm2 5v4m-2-2h4m5-1h.1" /></svg>
          <span>Игры</span>
        </button>
        <button class="nav-item" data-view-link="history">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v16H4V5Zm4-2v4m8-4v4M4 10h16" /></svg>
          <span>История</span>
        </button>
        <button class="nav-item" data-view-link="stats">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10m6 10V4m6 16v-7m4 7H2" /></svg>
          <span>Итоги</span>
        </button>
        <button class="nav-item" data-view-link="settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M9.8 3h4.4l.6 2.4c.5.2 1 .5 1.4.8l2.3-.7 2.2 3.8-1.8 1.7a7 7 0 0 1 0 2l1.8 1.7-2.2 3.8-2.3-.7c-.4.3-.9.6-1.4.8l-.6 2.4H9.8l-.6-2.4c-.5-.2-1-.5-1.4-.8l-2.3.7-2.2-3.8L5.1 13a7 7 0 0 1 0-2L3.3 9.3l2.2-3.8 2.3.7c.4-.3.9-.6 1.4-.8L9.8 3Z" /></svg>
          <span>Ещё</span>
        </button>
      </nav>
    </div>

    <div id="modalRoot"></div>
    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
    <input id="importInput" class="visually-hidden" type="file" accept="application/json,.json" />

    <script type="module" src="js/app.js?v=2.3.0"></script>
  </body>
</html>
